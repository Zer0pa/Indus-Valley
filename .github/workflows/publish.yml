name: publish

# Publish gnosis-indus to PyPI using Trusted Publishing (OIDC).
# No API tokens or passwords are used — identity is established via
# the GitHub Actions OIDC token against the PyPI pending publisher
# registered for Zer0pa/Indus-Valley, workflow publish.yml, env pypi.
#
# Trigger: a GitHub Release is published (any tag).
# Build and check run first in an isolated job; the publish job only
# runs after the build artifact is verified.

on:
  release:
    types: [published]

jobs:
  build:
    name: Build and verify distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distribution metadata
        run: twine check --strict dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gnosis-indus
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Attestations default to enabled in pypa/gh-action-pypi-publish@release/v1.
        # No explicit attestations: false — defaults are accepted.
